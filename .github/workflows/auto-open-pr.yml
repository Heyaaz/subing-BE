name: Auto Open PR

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-open-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  open-pr:
    if: ${{ github.event.repository.fork == false && !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Create pull request when missing
        uses: actions/github-script@v7
        env:
          BASE_BRANCH: ${{ vars.AUTO_PR_BASE_BRANCH || 'main' }}
          PR_DRAFT: ${{ vars.AUTO_PR_DRAFT || 'false' }}
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = process.env.BASE_BRANCH || 'main';

            if (!branch || branch === base) {
              core.info(`Skipping auto PR for branch "${branch}" targeting "${base}".`);
              return;
            }

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              base,
              per_page: 100,
            });

            if (existing.length > 0) {
              core.info(`Open PR already exists: #${existing[0].number}`);
              return;
            }

            const commitMessage = (context.payload.head_commit?.message || '').split('\n')[0].trim();
            const title = commitMessage || `Auto PR: ${branch}`;
            const draft = (process.env.PR_DRAFT || 'false').toLowerCase() === 'true';

            const body = [
              'This pull request was opened automatically after a branch push.',
              '',
              `- Source branch: \`${branch}\``,
              `- Target branch: \`${base}\``,
              `- Triggered by: @${context.actor}`,
              '',
              'Update the title/body as needed before merge.',
            ].join('\n');

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: branch,
              base,
              body,
              draft,
              maintainer_can_modify: true,
            });

            core.notice(`Created PR #${pr.data.number}: ${pr.data.html_url}`);
